  <!-- KaTeX — renderizado de notación matemática formal -->

<body>
  <div id="app" class="app">

    <!-- ── TOP BAR ───────────────────────────────────────────────── -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <span class="brand-text">
          DataClean<span class="accent">Pro</span>

        </span>
      </div>

      <nav class="stepper" aria-label="Pasos del flujo"></nav>

      <div class="session-info">
        <span class="authors-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.6">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>

        <span>server</span>

    <!-- ── STATUS BAR ───────────────────────────────────────────── -->
    <footer class="statusbar">
      <div class="group">
        <span>python main.py</span>

        <span>pandas 2.0 · scikit-learn 1.3</span>

        <span class="muted">&amp;</span>
        <span class="authors-name">Cesar Villanueva</span>
      </div>
      <div class="group">
        <span>Sesión: <span style="color:var(--accent-green)">activa</span></span>
        <span class="muted">·</span>
        <span>127.0.0.1:8000</span>
      </div>
    </footer>

  </div><!-- /#app -->

  <!-- ── JavaScript — orden importante ────────────────────────────
       formulas.js    → TECHNIQUES global (sin dependencias)
       app.js         → AppState, api(), renderStep() (controla todo)
       upload.js      → renderUpload()
       charts.js      → renderHeatmap(), renderHistogram(), etc.
       dashboard.js   → renderDashboard()  (usa charts.js)
       imputation.js  → renderImputation() (usa formulas.js)
       comparison.js  → renderComparison()
  ─────────────────────────────────────────────────────────────── -->
  <script src="/js/formulas.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/upload.js"></script>
  <script src="/js/charts.js"></script>
